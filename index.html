<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2563eb" />
  <title>Devine l’image</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f3f4f6;color:#111827}
    .app{max-width:560px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column;gap:14px}
    h1{margin:4px 0 0;font-size:clamp(28px,5vw,38px)}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .pill{background:#e5e7eb;border-radius:999px;padding:8px 12px;font-weight:700}
    .card{background:#fff;border-radius:20px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:16px;background:#d1d5db;display:block}
    h2{margin:12px 0 10px;font-size:clamp(20px,4vw,28px)}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    button{border:0;border-radius:16px;padding:14px 16px;font-size:16px;font-weight:700;cursor:pointer}
    .choice{background:#2563eb;color:#fff;min-height:56px}
    .choice:disabled{opacity:.65;cursor:not-allowed}
    .next{background:#111827;color:#fff;width:100%;min-height:54px}
    .next.hidden{display:none}
    .feedback{min-height:1.5em;font-weight:800;font-size:18px}
    .good{color:#15803d}.bad{color:#b91c1c}
    .footer{opacity:.7;font-size:14px;text-align:center;margin-top:auto;padding:8px 0 2px}
    @media (max-width:420px){.choices{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <h1>Devine l’image</h1>
      <div class="pill" id="scorePill">Score : 0</div>
    </div>

    <div class="card">
      <div class="pill" id="progress">Question 1/4</div>
      <h2 id="questionText">Quelle image correspond le mieux ?</h2>
      <img id="questionImage" alt="Image du quiz" />
      <div id="choices" class="choices"></div>
      <p id="feedback" class="feedback"></p>
      <button id="nextBtn" class="next hidden">Question suivante</button>
    </div>

    <p class="footer">Version 1 fichier, prête pour GitHub Pages.</p>
  </main>

  <script>
    const questions = [
      { text: 'C’est un muffin ou un chien ?', image: 'https://images.unsplash.com/photo-1604908176997-125f25cc500f?auto=format&fit=crop&w=900&q=80', choices: ['Muffin','Chien'], answer: 'Muffin' },
      { text: 'C’est une chambre du Crous ou une cellule ?', image: 'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=900&q=80', choices: ['Chambre du Crous','Cellule de prison'], answer: 'Chambre du Crous' },
      { text: 'C’est un cookie ou un chat ?', image: 'https://images.unsplash.com/photo-1499636136210-6f4ee915583e?auto=format&fit=crop&w=900&q=80', choices: ['Cookie','Chat'], answer: 'Chat' },
      { text: 'C’est une pizza ou un sac ?', image: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=900&q=80', choices: ['Pizza','Sac'], answer: 'Pizza' }
    ];

    const elImage = document.getElementById('questionImage');
    const elText = document.getElementById('questionText');
    const elChoices = document.getElementById('choices');
    const elFeedback = document.getElementById('feedback');
    const elNext = document.getElementById('nextBtn');
    const elProgress = document.getElementById('progress');
    const elScore = document.getElementById('scorePill');

    let index = 0;
    let score = 0;
    let locked = false;

    function render() {
      locked = false;
      const q = questions[index];
      elImage.src = q.image;
      elText.textContent = q.text;
      elProgress.textContent = `Question ${index + 1}/${questions.length}`;
      elFeedback.textContent = '';
      elFeedback.className = 'feedback';
      elNext.classList.add('hidden');
      elChoices.innerHTML = '';

      q.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.textContent = choice;
        btn.addEventListener('click', () => pick(choice, btn));
        elChoices.appendChild(btn);
      });
    }

    function pick(choice, btn) {
      if (locked) return;
      locked = true;
      const q = questions[index];
      const buttons = [...elChoices.querySelectorAll('button')];
      buttons.forEach(b => b.disabled = true);
      if (choice === q.answer) {
        score++;
        elFeedback.textContent = 'Bonne réponse !';
        elFeedback.classList.add('good');
        btn.style.background = '#15803d';
      } else {
        elFeedback.textContent = `Raté — c’était ${q.answer}.`;
        elFeedback.classList.add('bad');
        btn.style.background = '#b91c1c';
        buttons.find(b => b.textContent === q.answer)?.style.setProperty('background', '#15803d');
      }
      elScore.textContent = `Score : ${score}`;
      elNext.classList.remove('hidden');
    }

    elNext.addEventListener('click', () => {
      index++;
      if (index >= questions.length) {
        elText.textContent = 'Partie terminée';
        elImage.removeAttribute('src');
        elChoices.innerHTML = '';
        elProgress.textContent = 'Terminé';
        elFeedback.textContent = `Score final : ${score}/${questions.length}`;
        elFeedback.className = 'feedback good';
        elNext.classList.add('hidden');
        return;
      }
      render();
    });

    render();
  </script>
</body>
</html>
