<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2563eb" />
  <title>Devine l’image</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="top">
      <h1>Devine l’image</h1>
      <div class="pill" id="scorePill">Score : 0</div>
    </div>

    <div class="card">
      <div class="pill" id="progress">Question 1/4</div>
      <h2 id="questionText">Quelle image correspond le mieux ?</h2>
      <img id="questionImage" alt="Image du quiz" src ="https://plus.unsplash.com/premium_photo-1680303237111-35809e47fcc1?auto=format&fit=crop&w=900&q=80"/>
      <div id="choices" class="choices"></div>
      <p id="feedback" class="feedback"></p>
      <button id="nextBtn" class="next hidden">Question suivante</button>
    </div>

    <p class="footer">Version simple pour GitHub Pages.</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
